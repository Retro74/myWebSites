<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="navnInput" placeholder="Skriv navnet ditt">
<button onclick="lagreNavn()">Lagre</button>
<button onclick="hentNavn()">Hent navn</button>

<p id="output"></p>
<script>
    function lagreNavn() {
    let navn = document.getElementById("navnInput").value;
    document.cookie = "brukernavn=" + navn + "; path=/";

}
function hentNavn() {
    let cookies = document.cookie;
    let brukernavn = cookies.split(";")
    document.getElementById("output").innerText = brukernavn[1];
}

window.onload = function() {
    hentNavn();
};
</script>
</body>
</html>
